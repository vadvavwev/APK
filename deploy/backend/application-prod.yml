# Job Platform Backend - Spring Boot Application
spring:
  application:
    name: job-platform-backend

  # Database - use external MySQL in production
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:3306/job_platform?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=10000
    username: ${DB_USERNAME:jobuser}
    password: ${DB_PASSWORD:JobPlatform@2024}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
    open-in-view: false

  # Jackson
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null

  # File upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# Server
server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 1024

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_SECRET_IN_PRODUCTION_MUST_BE_256_BITS_LONG}
  expiration: 604800000  # 7 days in milliseconds

# CORS Configuration
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://your-domain.com,https://your-domain.com}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# Swagger/OpenAPI - disabled in production
springdoc:
  api-docs:
    enabled: ${ENABLE_SWAGGER:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${ENABLE_SWAGGER:false}

# Logging
logging:
  level:
    root: INFO
    com.jobplatform: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  file:
    name: logs/job-platform.log
    max-size: 50MB
    max-history: 30

# Actuator for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

---
# Development profile
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
  hibernate:
    ddl-auto: update
  jackson:
    serialization:
      fail-on-empty-beans: false

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  jackson:
    serialization:
      fail-on-empty-beans: false