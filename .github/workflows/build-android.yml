name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  JAVA_VERSION: '17'
  ANDROID_SDK_BUILD_TOOLS: '35.0.0'
  ANDROID_SDK_PLATFORM: '35'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # 1. Checkout code
      # ============================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ============================================
      # 2. Setup Node.js (fixed version)
      # ============================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # ============================================
      # 3. Install pnpm (fixed version)
      # ============================================
      - name: Install pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      # ============================================
      # 4. Configure pnpm for CI (no prompts)
      # ============================================
      - name: Configure pnpm
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm config set auto-install-peers false
          pnpm config set enable-pre-post-scripts false

      # ============================================
      # 5. pnpm cache (static path, no dynamic detection)
      # ============================================
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # ============================================
      # 6. Install dependencies ONLY (no pnpm add!)
      # ============================================
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ============================================
      # 7. Build web app
      # ============================================
      - name: Build web app
        run: pnpm build

      # ============================================
      # 8. Sync to Android
      # ============================================
      - name: Sync to Android
        run: npx cap sync android

      # ============================================
      # 9. Set up JDK (fixed version)
      # ============================================
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # ============================================
      # 10. Setup Android SDK (fixed version)
      # ============================================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          build-tools: ${{ env.ANDROID_SDK_BUILD_TOOLS }}
          platform: ${{ env.ANDROID_SDK_PLATFORM }}

      # ============================================
      # 11. Build debug APK
      # ============================================
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --warning-mode=all

      # ============================================
      # 12. Upload APK artifact
      # ============================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7